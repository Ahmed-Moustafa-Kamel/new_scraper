name: Run News RSS rss Pipeline

on:
  schedule:
    # Runs every day at 6:00 AM UTC (Adjust cron expression as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows you to click a button in GitHub and trigger it manually anytime

jobs:
  run-rss:
    runs-on: ubuntu-latest

    # Permissions needed to push the generated CSV file back to the repo
    permissions:
      contents: write

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser pandas requests readability-lxml beautifulsoup4 playwright playwright-stealth chardet lxml

    - name: Install Playwright Chromium Browser & System Dependencies
      run: |
        # Installs the exact chromium binary and its missing Linux system libraries
        playwright install chromium --with-deps

    - name: Execute rss Pipeline
      run: |
        # We invoke main as a module (-m) so it resolves relative imports correctly
        python -m rss.main.py

    - name: Commit and Push output CSV data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if the file changed or was created to prevent empty commit errors
        if [ -f "rss_output.csv" ]; then
          git add rss_output.csv
          if git diff --staged --quiet; then
            echo "No changes detected in the data feed today."
          else
            git commit -m "🔄 Auto-update: Extracted RSS news feed data [skip ci]"
            git push
          fi
        else
          echo "Error: rss_output.csv was not generated."
          exit 1
        fi