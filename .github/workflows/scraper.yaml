name: News Scraper

on:
  schedule:
    - cron: '0 6 * * *'    # 8:00 AM Cairo Time
    - cron: '0 14 * * *'   # 4:00 PM Cairo Time
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth pandas requests beautifulsoup4 readability-lxml chardet python-dateutil lxml

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps

      - name: Run extractor
        env:
          EXTRACTOR_WORKERS: "10"
          OUTPUT_FILE: "articles.csv"
        run: python extractor.py

      - name: Commit articles.csv to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.csv
          git diff --staged --quiet || git commit -m "update articles.csv - $(date '+%Y-%m-%d %H:%M UTC')"
          git push