name: Run Almasry Scraper Trial

on:
  workflow_dispatch: # Allows you to manually click "Run workflow" from GitHub UI
  schedule:
    - cron: '0 8 * * *' # Automatically runs daily at 8:00 AM UTC

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Fixed typo here from 'python-python-version'
        cache: 'pip' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth

    - name: Ensure Playwright browsers are installed
      run: |
        python -m playwright install chromium --with-deps

    - name: Run Scraper Script
      run: python test_almasry.py