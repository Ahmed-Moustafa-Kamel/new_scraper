name: News Scraper

on:
  schedule:
    - cron: '0 6 * * *'    # every day at 6am UTC (8am Cairo)
    - cron: '0 14 * * *'   # every day at 2pm UTC (4pm Cairo)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium || true
          sudo apt-get install -y libasound2t64 || true

      - name: Run extractor
        env:
          SCRAPER_WORKERS: "3"
          EXTRACTOR_WORKERS: "10"
          FILTER_DAYS: "30"
        run: python extractor.py

      - name: Commit articles.csv to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.csv
          git diff --staged --quiet || git commit -m "update articles.csv - $(date '+%Y-%m-%d %H:%M UTC')"
          git push